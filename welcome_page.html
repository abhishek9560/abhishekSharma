<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>application_06</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .head {
            width: 100%;
            height: 100vh;
            /* background-color: aqua; */
        }

        header {
            width: 100%;
            display: flex;
            border-bottom: 3.5px solid lightgray;
        }

        .div_header {
            height: 55px;
            display: flex;
            column-gap: 6px;
            align-items: center;
        }

        .icon_div {
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            text-align: center;
            padding: 3px 0;
            border-radius: 6px;
            background-color: #c3361d;
        }

        .logo_div {
            width: 60px;
            height: 40px;
            background-image: url(https://thumbs.dreamstime.com/b/icp-logo-icp-letter-icp-letter-logo-design-initials-icp-logo-linked-circle-uppercase-monogram-logo-icp-typography-396227126.jpg);
            background-size: 70px;
            background-position: center;
            border-radius: 20px;
        }

        .Image_div {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid lightgray;
        }

        .name_show {
            margin-left: 4px;
            height: max-content;
            font-family: sans-serif, system-ui;
        }

        .Lo-out {
            width: 45px;
            height: 45px;
            font-size: x-large;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 50%;
            margin-right: 15px;
            background-color: black;
        }

        main {
            width: 100%;
            height: 65%;
            display: flex;
            margin-top: 20px;
            justify-content: center;
            /* background-color: red; */
        }

        .infor_div {
            width: 90%;
            display: flex;
            row-gap: 14px;
            border-radius: 20px;
            align-items: center;
            flex-direction: column;
            border: 2px solid aqua;
            /* background-color: lightskyblue; */
        }

        .mini_header {
            width: 100%;
            font-weight: 900;
            height: 50px;
            font-size: 22px;
            line-height: 1.8;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: fantasy;
            background-color: aqua;
            border-radius: 16px 16px 0 0;
        }

        footer {
            width: 100%;
            display: flex;
            margin-top: 14px;
            padding-bottom: 15px;
            justify-content: center;
        }

        .footer_div {
            width: 95%;
            height: auto;
            padding: 5px 0;
            font-size: 16.5px;
            text-align: center;
            border-radius: 20px;
            border: 2px solid darkgreen;
            background-color: lightgreen;
            font-family: math, system-ui, sans-serif;
        }

        .slide_Box {
            width: 260px;
            height: 91.3%;
            top: 55px;
            position: fixed;
            left: -270px;
            background: #fff;
            border-radius: 0 15px 0 0;
            box-shadow: 6px 0px 5px 0px rgba(0, 0, 0, 0.3);
            transition: 0.4s;
            z-index: 2;
        }

        .slide_Box.active {
            left: 0;
        }

        .slide_div {
            width: 100%;
            display: flex;
            margin-bottom: 5px;
            align-items: center;
            border-radius: 0 15px 0 0;
            background-color: #c3361d;
        }

        .icon_Bx {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .text_div {
            color: white;
            line-height: 40px;
            font-family: math;
            margin-left: 10px;
            font-size: 18px;
            text-transform: math-auto;
        }
    </style>
</head>

<body>

    <div class="head">
        <header>
            <div class="div_header" style="width: 35%;">
                <div class="icon_div" onclick="toggleBox()">
                    <i class="fa-sharp fa-solid fa-bars" style="font-size: x-large;"></i>
                </div>
                <div class="logo_div"></div>
            </div>
            <!-- slide box code -->
            <div class="slide_Box" id="SlBox">
                <!-- number = 01 -->
                <div class="slide_div">
                    <div class="icon_Bx">
                        <i class="fa-solid fa-house" style="color: white; margin-left: 5px;">
                        </i>
                    </div>
                    <a href="welcome_page.html" style="text-decoration: none;">
                        <div class="text_div">Dashboard</div>
                    </a>
                </div>
                <!-- number = 02 -->
                <div class="slide_div" style="border-radius: 0;">
                    <div class="icon_Bx">
                        <i class="fa-solid fa-circle-user" style="color: white; margin-left: 5px;"></i>
                    </div>
                    <a href="persoanal_infor.html" style="text-decoration: none;">
                        <div class="text_div">Personal Information</div>
                    </a>
                </div>
                <!-- number = 03 -->
                <div class="slide_div" style="border-radius: 0;">
                    <div class="icon_Bx">
                        <i class="fa-sharp fa-solid fa-arrow-rotate-right" style="margin-left: 5px; color: white;"></i>
                    </div>
                    <a href="update.html" style="text-decoration: none;">
                        <div class="text_div">Update Information</div>
                    </a>
                </div>
                <!-- number = 04 -->
                <div class="slide_div" style="border-radius: 0;">
                    <div class="icon_Bx">
                        <i class="fa-solid fa-upload" style="margin-left: 5px; color: white;"></i>
                    </div>
                    <a href="upload.html" style="text-decoration: none;">
                        <div class="text_div">Upload Information</div>
                    </a>
                </div>
            </div>
            <div class="div_header" style="width: 65%; justify-content: end; column-gap: 10px;">
                <div class="Image_div" id="image_div">
                    <img id="img_div" width="45px" height="45px" alt="No Image" style="border-radius: 50%;">
                </div>
                <div class="Lo-out">
                    <i class="fa-solid fa-power-off" style="font-size: 25px; color: white;"></i>
                </div>
            </div>
        </header>
        <main>
            <div class="infor_div">
                <div class="mini_header">Dash board</div>
                <!-- number = 01 -->
                <div style="width: 85%; height: 60px; border-radius: 15px; border: 2px solid darkgreen;">
                    <p
                        style="width: 100%; height: 50%; border-radius: 12px 12px 0 0; background-color: aquamarine; text-align: center; line-height: 1.3;">
                        Applicant's Name
                    </p>
                    <p style="width: 100%; height: 50%; background-color: #f5deb38a; text-align: center; line-height: 1.4; text-transform: uppercase; border-radius: 0 0 12px 12px;"
                        id="name">No Found !</p>
                </div>
                <!-- number = 02 -->
                <div style="width: 85%; height: 60px; border-radius: 15px; border: 2px solid darkgreen;">
                    <p
                        style="width: 100%; height: 50%; border-radius: 12px 12px 0 0; background-color: aquamarine; text-align: center; line-height: 1.3;">
                        Gender
                    </p>
                    <p style="width: 100%; height: 50%; background-color: #f5deb38a; text-align: center; line-height: 1.4; text-transform: capitalize; border-radius: 0 0 12px 12px;"
                        id="gender">No Found !</p>
                </div>
                <!-- number = 03 -->
                <div style="width: 85%; height: 60px; border-radius: 15px; border: 2px solid darkgreen;">
                    <p
                        style="width: 100%; height: 50%; border-radius: 12px 12px 0 0; background-color: aquamarine; text-align: center; line-height: 1.3;">
                        Father's Name
                    </p>
                    <p style="width: 100%; height: 50%; background-color: #f5deb38a; text-align: center; line-height: 1.4; text-transform: capitalize; border-radius: 0 0 12px 12px;"
                        id="f_name">No Found !</p>
                </div>
                <!-- number = 04 -->
                <div style="width: 85%; height: 60px; border-radius: 15px; border: 2px solid darkgreen;">
                    <p
                        style="width: 100%; height: 50%; border-radius: 12px 12px 0 0; background-color: aquamarine; text-align: center; line-height: 1.3;">
                        Mobile No
                    </p>
                    <p style="width: 100%; height: 50%; background-color: #f5deb38a; text-align: center; line-height: 1.4; border-radius: 0 0 12px 12px;"
                        id="mobile_no">No Found !</p>
                </div>
                <!-- number = 05 -->
                <div style="width: 85%; height: 60px; border-radius: 15px; border: 2px solid darkgreen;">
                    <p
                        style="width: 100%; height: 50%; border-radius: 12px 12px 0 0; background-color: aquamarine; text-align: center; line-height: 1.3;">
                        Date of Birth
                    </p>
                    <p style="width: 100%; height: 50%; background-color: #f5deb38a; text-align: center; line-height: 1.4; border-radius: 0 0 12px 12px;"
                        id="DOB">No Found !</p>
                </div>
            </div>
        </main>
        <footer>
            <div class="footer_div">© Online Facilitation System for Students. All rights reserved @2018
            </div>
        </footer>
    </div>





    <script>
        // top details show code.
        const U_data = JSON.parse(localStorage.getItem("userdetails_filled"));
        const Date_Of_Birth = U_data.dob;
        const parts = Date_Of_Birth.split("-");
        const dob_I = parts[2] + "-" + parts[1] + "-" + parts[0];
        if (U_data) {
            document.getElementById("img_div").src = U_data.image;
            document.getElementById("name").innerText = U_data.name;
            document.getElementById("gender").innerText = U_data.Gender;
            document.getElementById("f_name").innerText = U_data.father;
            document.getElementById("mobile_no").innerText = U_data.mobile;
            document.getElementById("DOB").innerText = dob_I;
        } else {
            alert("No Data Found ! ❌\n( कोई भी जानकारी नहीं है। )");
        }

        function toggleBox() {
            document.getElementById("SlBox").classList.toggle("active");
        }
    </script>
</body>

</html>
